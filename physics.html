<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Physics Notes - Library</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            min-height: 100%;
            background-color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Top Bar for Search */
        .header {
            position: sticky;
            top: 0;
            background: white;
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 30px 0;
            z-index: 100;
        }

        .search-box {
            width: 80%;
            max-width: 400px;
            padding: 12px 20px;
            font-size: 1rem;
            border: 2px solid #eee;
            border-radius: 30px;
            outline: none;
            transition: border-color 0.3s;
        }

        .search-box:focus {
            border-color: green;
        }

        /* The List of Files */
        .file-list {
            list-style: none;
            padding: 0;
            margin: 20px 0 100px 0; /* Space at bottom for scrolling */
            width: 90%;
            max-width: 600px;
            text-align: center;
        }

        .file-item {
            position: relative;
            margin: 20px 0;
            display: block; /* Makes the whole area clickable */
        }

        .file-item a {
            text-decoration: none;
            color: black;
            font-size: 1.4rem;
            display: inline-block;
            position: relative;
            padding: 5px 0;
            transition: transform 0.2s ease;
        }

        /* The Fancy Underline */
        .file-item a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 3px;
            bottom: 0;
            left: 50%;
            background-color: green;
            transition: all 0.3s ease-in-out;
            transform: translateX(-50%);
        }

        .file-item a:hover::after {
            width: 100%;
        }

        .file-item a:hover {
            transform: scale(1.05);
        }

        .hidden { display: none; }

        /* Back Button */
        .back-btn {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #888;
            text-decoration: none;
        }
        .back-btn:hover { color: green; }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn">← Back to Subjects</a>

    <div class="header">
        <input type="text" class="search-box" id="fileSearch" placeholder="Search physics files..." onkeyup="filterFiles()">
    </div>

    <ul class="file-list" id="fileList">
        <!-- Add your files here -->
        <!-- <li class="file-item"><a href="notes/math/calculus_1.pdf">Calculus I - Limits and Derivatives</a></li> -->
    </ul>

    <script>
        function filterFiles() {
            const input = document.getElementById('fileSearch');
            const filter = input.value.toLowerCase();
            const items = document.querySelectorAll('.file-item');

            items.forEach(item => {
                const text = item.textContent || item.innerText;
                if (text.toLowerCase().includes(filter)) {
                    item.classList.remove('hidden');
                } else {
                    item.classList.add('hidden');
                }
            });
        }
    </script>

</body>
</html>
